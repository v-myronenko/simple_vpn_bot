name: Deploy to production

on:
  push:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          python -m py_compile bot/bot.py
          python -m py_compile bot/handlers/instruction.py
          python -m py_compile bot/services/locale_service.py
          python -m py_compile bot/middlewares/i18n.py
          echo "Syntax OK"

  deploy:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/svpn/simple_vpn_bot
            git pull origin master
            sudo systemctl restart svpn-backend
            sudo systemctl restart svpn-bot
            echo "Deploy done at $(date)"